# Phase 13: TUI package CI — typecheck, build, and a non-interactive
# smoke run. The repo's live config/state files are gitignored, so the
# smoke test only exercises commands that tolerate their absence.
name: tui
on:
  push:
    paths: ["app/**", ".github/workflows/tui.yml"]
  pull_request:
    paths: ["app/**", ".github/workflows/tui.yml"]
jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: npm run typecheck
      - run: npm run build
      - run: npm run smoke
