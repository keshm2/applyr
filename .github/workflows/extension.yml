# Phase 10: browser-extension CI — typecheck and build the MV3 bundle.
name: extension
on:
  push:
    paths: ["extension/**", ".github/workflows/extension.yml"]
  pull_request:
    paths: ["extension/**", ".github/workflows/extension.yml"]
jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: extension
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: npm run typecheck
      - run: npm run build
